<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Cambridge International A &amp; AS Level Economics Paper 1 Multiple Choice Revision">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EconMCQ">
  <link rel="manifest" href="manifest.json">
  <title>CIE Economics MCQ Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "35b5498b239145409d6c8bb24d735545"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
  <div class="app-layout" id="appLayout">
    <!-- Mobile Menu Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
        </div>
        <div class="sidebar-brand-text">
          <h1>Cambridge Economics</h1>
          <span id="sidebarSyllabusLabel">AS Level</span>
        </div>
      </div>

      <div class="sidebar-nav">
        <div class="sidebar-section-label">
          <span class="sidebar-section-dot"></span>Main
        </div>
        <button class="sidebar-link active" data-view="home" onclick="App.navigate('home')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></span> Dashboard
        </button>

        <div class="sidebar-section-label">
          <span class="sidebar-section-dot"></span>Practice
        </div>
        <button class="sidebar-link" data-view="chapter-select" onclick="App.navigate('chapter-select')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-9a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg></span> By Chapter
        </button>
        <button class="sidebar-link" data-view="paper-select" onclick="App.navigate('paper-select')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></span> By Past Paper
        </button>
        <button class="sidebar-link" data-view="random-practice" onclick="App.navigate('random-practice')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 4 3 3-3 3"/><path d="m18 20 3-3-3-3"/><path d="M3 7h3a5 5 0 0 1 5 5 5 5 0 0 0 5 5h5"/><path d="M21 7h-5a4.978 4.978 0 0 0-3 1"/></svg></span> Random Mode
        </button>

        <div class="sidebar-section-label">
          <span class="sidebar-section-dot"></span>Review
        </div>
        <button class="sidebar-link" data-view="wrong-book" id="navWrongBook" onclick="App.navigate('wrong-book')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg></span> Wrong Questions
          <span class="badge" id="wrongCountBadge" style="display:none">0</span>
        </button>
        <button class="sidebar-link" data-view="bookmarks" id="navBookmarks" onclick="App.navigate('bookmarks')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg></span> Bookmarks
          <span class="badge" id="bookmarkCountBadge" style="display:none">0</span>
        </button>

        <div class="sidebar-section-label">
          <span class="sidebar-section-dot"></span>Analytics
        </div>
        <button class="sidebar-link" data-view="stats" onclick="App.navigate('stats')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></span> Statistics
        </button>
        <button class="sidebar-link" data-view="search" onclick="App.navigate('search')">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span> Search
        </button>
      </div>

      <div class="sidebar-footer">
        <button class="sidebar-syllabus-switch" onclick="App.goBackToLanding()" title="Switch Syllabus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3"/><path d="m16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><path d="M12 20V4"/></svg>
          <span>Switch Syllabus</span>
        </button>
        <div class="sidebar-footer-bottom">
          <div class="sidebar-footer-actions">
            <button onclick="UpdateNotes.openManual()" title="View update notes">Updates</button>
            <button onclick="App.toggleDarkMode()" title="Toggle dark mode" class="btn-icon-only">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
            <button onclick="App.navigate('settings')" title="Settings" class="btn-icon-only">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="sidebar-signature">
            Developed by <strong>Cherry</strong>
            <span class="sidebar-version">v0.9.0</span>
          </div>
        </div>
      </div>
    </nav>


    <!-- Mobile Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" onclick="App.toggleSidebar()">&#x2630;</button>
      <span class="brand-sm">CIE Economics MCQ</span>
    </div>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
      <div class="content-wrapper" id="contentWrapper">
        <!-- Dynamically rendered by app.js -->
      </div>
    </main>
  </div>

  <div class="update-modal-overlay hidden" id="updateModalOverlay" aria-hidden="true">
    <div class="update-modal" role="dialog" aria-modal="true" aria-labelledby="updateModalVersion">
      <button class="update-modal-close" type="button" aria-label="Close update notes" onclick="UpdateNotes.close()">&times;</button>
      <div class="update-modal-kicker">What&rsquo;s New</div>
      <h2 class="update-modal-version" id="updateModalVersion"></h2>
      <p class="update-modal-title" id="updateModalTitle"></p>
      <div class="update-modal-body" id="updateModalBody"></div>
      <div class="update-modal-actions">
        <button class="btn" type="button" onclick="UpdateNotes.close()">Later</button>
        <button class="btn btn-primary" type="button" onclick="UpdateNotes.dismissCurrentVersion()">Do not show again for this version</button>
      </div>
    </div>
  </div>

  <!-- Data Layer (must load before app) -->
  <script src="data/questions.js"></script>

  <!-- AS Data Layer -->
  <script src="data/as/questions.js"></script>
  <!-- Syllabus Bridge -->
  <script>
    window.SYLLABUS_CONFIG = {
      a2: { label: "A2 Economics", active: true },
      as: { label: "AS Economics", active: true, comingSoon: false }
    };
  </script>

  <!-- Application Logic -->
  <script src="app.js"></script>
</body>
</html>
