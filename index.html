<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Cambridge International A &amp; AS Level Economics Paper 1 Multiple Choice Revision">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EconMCQ">
  <link rel="manifest" href="manifest.json">
  <title>CIE Economics MCQ Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "35b5498b239145409d6c8bb24d735545"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
  <div class="app-layout" id="appLayout">
    <!-- Mobile Menu Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>CIE Economics MCQ</h1>
        <span>Cambridge International A &amp; AS Level</span>
      </div>

      <div class="sidebar-nav">

        <div class="sidebar-section-label">Syllabus</div>
        <button class="sidebar-link active" data-syllabus="a2" id="navSyllabusA2" onclick="App.setSyllabus('a2')">
          <span class="icon">&#x1F393;</span> A2 Economics
        </button>
        <button class="sidebar-link" data-syllabus="as" id="navSyllabusAS" onclick="App.setSyllabus('as')">
          <span class="icon">&#x1F4D8;</span> AS Economics
          <span class="badge badge-coming" id="asComingBadge">Soon</span>
        </button>

        <div class="sidebar-section-label">Main</div>
        <button class="sidebar-link active" data-view="home" onclick="App.navigate('home')">
          <span class="icon">&#x1F3E0;</span> Dashboard
        </button>

        <div class="sidebar-section-label">Practice</div>
        <button class="sidebar-link" data-view="chapter-select" onclick="App.navigate('chapter-select')">
          <span class="icon">&#x1F4DA;</span> By Chapter
        </button>
        <button class="sidebar-link" data-view="paper-select" onclick="App.navigate('paper-select')">
          <span class="icon">&#x1F4C4;</span> By Past Paper
        </button>
        <button class="sidebar-link" data-view="random-practice" onclick="App.navigate('random-practice')">
          <span class="icon">&#x1F3B2;</span> Random Mode
        </button>

        <div class="sidebar-section-label">Review</div>
        <button class="sidebar-link" data-view="wrong-book" id="navWrongBook" onclick="App.navigate('wrong-book')">
          <span class="icon">&#x274C;</span> Wrong Questions
          <span class="badge" id="wrongCountBadge" style="display:none">0</span>
        </button>
        <button class="sidebar-link" data-view="bookmarks" id="navBookmarks" onclick="App.navigate('bookmarks')">
          <span class="icon">&#x1F516;</span> Bookmarks
          <span class="badge" id="bookmarkCountBadge" style="display:none">0</span>
        </button>

        <div class="sidebar-section-label">Analytics</div>
        <button class="sidebar-link" data-view="stats" onclick="App.navigate('stats')">
          <span class="icon">&#x1F4CA;</span> Statistics
        </button>
        <button class="sidebar-link" data-view="search" onclick="App.navigate('search')">
          <span class="icon">&#x1F50D;</span> Search
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-footer-actions">
          <button onclick="App.toggleDarkMode()" title="Toggle dark mode">&#x1F319;</button>
          <button onclick="App.navigate('settings')" title="Settings">&#x2699;</button>
        </div>
        <div class="sidebar-signature">Built by Cherry, an Economic Student</div>
      </div>
    </nav>

    <!-- Mobile Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" onclick="App.toggleSidebar()">&#x2630;</button>
      <span class="brand-sm">CIE Economics MCQ</span>
    </div>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
      <div class="content-wrapper" id="contentWrapper">
        <!-- Dynamically rendered by app.js -->
      </div>
    </main>
  </div>

  <!-- Data Layer (must load before app) -->
  <script src="data/questions.js"></script>

  <!-- AS Data Layer -->
  <script src="data/as/questions.js"></script>
  <!-- Syllabus Bridge -->
  <script>
    window.SYLLABUS_CONFIG = {
      a2: { label: "A2 Economics", active: true },
      as: { label: "AS Economics", active: false, comingSoon: true }
    };
  </script>

  <!-- Application Logic -->
  <script src="app.js"></script>
</body>
</html>
